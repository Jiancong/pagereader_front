<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字体与排版预览 — midjourney-ui-vue3 export</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/index.css" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: #081829;
        color: #fff;
      }
      section {
        margin-bottom: 48px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
      }
      h3 {
        margin: 0 0 16px;
        font-family: Oxanium, sans-serif;
        color: #ddc7ac;
        font-size: 13px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body class="ximeng-brand">
    <section>
      <h3>ximeng · Playfair 标题</h3>
      <h1 class="xm-hero__title font-playfair">海报与视频，AI 一站生成</h1>
      <p class="xm-hero__subtitle">从商品主图到推广短视频，无需设计基础，让创意几分钟内成片。</p>
    </section>

    <section>
      <h3>aidesigns · 渐变标题</h3>
      <h1 class="app-title-gradient" style="font-size: 2.5rem">AI Design Platform</h1>
      <p style="font-family: Oxanium, sans-serif; color: rgba(255,255,255,0.75)">
        正文与导航默认 Oxanium
      </p>
    </section>

    <section>
      <h3>导航文案</h3>
      <div class="nav-items--ximeng" style="display: flex; gap: 24px">
        <span class="menu-item active" style="position: relative">模板中心</span>
        <span class="menu-item">案例库</span>
        <span class="menu-item">定价</span>
      </div>
    </section>
  </body>
</html>
